<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marshall Style Browser Player</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="speaker">
      <header class="speaker-top">
        <h1>Marshall Browser Audio</h1>
      </header>

      <section class="category-box">
        <h3>Music Categories</h3>
        <div id="categoryButtons" class="categories"></div>
      </section>

      <section class="display-panel">
        <h2 id="trackTitle">No track selected</h2>
        <p id="trackMeta">Choose a track from the list.</p>
      </section>

      <section class="controls">
        <button id="prevBtn" type="button">⏮</button>
        <button id="playPauseBtn" type="button">▶</button>
        <button id="nextBtn" type="button">⏭</button>
        <button id="repeatBtn" type="button" title="Repeat mode">REP: OFF</button>
      </section>

      <section class="timeline">
        <span id="currentTime">00:00</span>
        <input id="progress" type="range" min="0" max="100" value="0" />
        <span id="duration">00:00</span>
      </section>

      <section class="knobs">
        <label for="volume">Volume</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
      </section>

      <section class="playlist-wrap">
        <h3>Playlist</h3>
        <ul id="playlist"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
