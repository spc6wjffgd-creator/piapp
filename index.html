<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marshall Style Browser Player</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="speaker">
      <header class="speaker-top">
        <h1>Marshall Browser Audio</h1>
      </header>

      <section class="category-box">
        <h3>음악 카테고리</h3>
        <div id="categoryButtons" class="categories"></div>
      </section>

      <section class="display-panel">
        <h2 id="trackTitle">선택된 곡 없음</h2>
        <p id="trackMeta">카테고리에서 곡을 선택해주세요.</p>
      </section>

      <section class="controls">
        <button id="prevBtn" type="button">⏮</button>
        <button id="playPauseBtn" type="button">▶</button>
        <button id="nextBtn" type="button">⏭</button>
      </section>

      <section class="timeline">
        <span id="currentTime">00:00</span>
        <input id="progress" type="range" min="0" max="100" value="0" />
        <span id="duration">00:00</span>
      </section>

      <section class="knobs">
        <label for="volume">Volume</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
      </section>

      <section class="playlist-wrap">
        <h3>재생목록</h3>
        <ul id="playlist"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
