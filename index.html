<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Music Player</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="player">
      <h1>브라우저 음악 플레이어</h1>
      <p class="hint">음악 파일(mp3, wav 등)을 선택해서 바로 재생할 수 있어요.</p>

      <label class="file-picker">
        <span>음악 파일 선택</span>
        <input id="fileInput" type="file" accept="audio/*" multiple />
      </label>
      <button id="saveToStorageBtn" class="secondary-btn" type="button">선택 파일 저장소에 업로드</button>

      <section class="storage-panel">
        <h3>내 저장소</h3>
        <p id="storageInfo">저장된 파일: 0개 / 0.00MB</p>
        <button id="clearStorageBtn" class="danger-btn" type="button">저장소 전체 삭제</button>
      </section>

      <section class="now-playing">
        <h2 id="trackTitle">선택된 곡 없음</h2>
        <p id="trackMeta">재생할 파일을 먼저 선택해주세요.</p>
      </section>

      <section class="controls">
        <button id="prevBtn" type="button">⏮ 이전</button>
        <button id="playPauseBtn" type="button">▶ 재생</button>
        <button id="nextBtn" type="button">⏭ 다음</button>
      </section>

      <section class="timeline">
        <span id="currentTime">00:00</span>
        <input id="progress" type="range" min="0" max="100" value="0" />
        <span id="duration">00:00</span>
      </section>

      <section class="volume-wrap">
        <label for="volume">볼륨</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="1" />
      </section>

      <section class="playlist-wrap">
        <h3>재생목록</h3>
        <ul id="playlist"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
